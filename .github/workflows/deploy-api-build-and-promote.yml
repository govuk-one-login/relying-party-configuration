name: Deploy API Build and Promote

permissions:
  id-token: write
  contents: read

on:
  push:
    branches:
      - main

jobs:
  unit-tests:
    uses: ./.github/workflows/unit-tests.yml

  integration-tests:
    uses: ./.github/workflows/integration-tests.yml

  sonarcloud:
    uses: ./.github/workflows/sonarcloud.yml

  terraform-checks:
    uses: ./.github/workflows/terraform-checks.yml

  checkov:
    uses: ./.github/workflows/checkov.yml

  validation:
    uses: ./.github/workflows/validation.yml

  deploy:
    uses: ./.github/workflows/deploy-api.yml
    needs:
      - unit-tests
      - integration-tests
      - sonarcloud
      - terraform-checks
      - checkov
      - validation
