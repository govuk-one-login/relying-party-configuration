openapi: 3.0.3
info:
  title: Client Registry API (read-write)
  version: 1.0.0
paths:
  /clients:
    get:
      summary: Get all clients (paginated)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClients'

    post:
      summary: Create a new client
      requestBody:
        description: Client to create
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'

  /client/{id}:
    parameters:
      - name: id
        in: path
        description: 'Client ID'
        required: true
        schema:
          type: string
    get:
      summary: Get client by clientId
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientWithID'
    put:
      summary: Update an existing client
      requestBody:
        description: Client to update
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Client'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'

components:
  schemas:
    PaginatedResponse:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        totalItems:
          type: integer
        totalPages:
          type: integer
    PaginatedClients:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
          properties:
            clients:
              type: array
              items:
                $ref: '#/components/schemas/ClientSummary'
      example:
        page: 1
        pageSize: 3
        totalItems: 6
        totalPages: 2
        clients:
          - clientID: testClientId1
            clientName: My Test Client 1
          - clientID: testClientId2
            clientName: My Test Client 2
          - clientID: testClientId3
            clientName: My Test Client 3
    ClientSummary:
      type: object
      properties:
        clientID:
          type: string
        clientName:
          type: string
    ClientWithID:
      required:
        - clientID
      allOf:
        - $ref: '#/components/schemas/Client'
        - type: object
          properties:
            clientID:
              type: string
    Client:
      type: object
      required:
        - clientName
        - clientAuthentication
        - redirectUrls
        - scopes
      properties:
        clientName:
          type: string
        clientAuthentication:
          description: How the service should authenticate with OneLogin
          $ref: '#/components/schemas/ClientAuthentication'
        scopes:
          description: The scopes that this service is requesting
          $ref: '#/components/schemas/Scopes'
        redirectUrls:
          description: The URL to redirect users to once they have logged in
          type: array
          items:
            type: string
            format: uri
        contacts:
          description: The email addresses of people who can be contacted about this service if the need arises
          type: array
          items:
            type: string
        postLogoutRedirectUrls:
          description: The valid redirect URLs that a user can be redirected to once they have logged out
          type: array
          items:
            type: string
            format: uri
        backChannelLogoutUri:
          description: A URI which a post request can be sent to after the user has logged out.
          type: string
          format: uri
        serviceType:
          $ref: '#/components/schemas/ServiceType'
        sectorIdentifierUri:
          description: Used to calculate the subject ID
          type: string
        subjectType:
          description: Which subject ID should be used to calculate the pairwise subject ID
          $ref: '#/components/schemas/SubjectType'
        isActive:
          description: Whether this integration is enabled or not.
          type: boolean
          default: true
        cookieConsentShared:
          type: boolean
          default: false
        testClient:
          type: boolean
          default: false
        jarValidationRequired:
          description: If enabled, rejects any non-JWT requests, and rejects any JWTs that are signed incorrectly.
          type: boolean
          default: false
        claims:
          description: Required if identityVerificationSupported is true. The list of requested claims when performing an identity journey.
          type: array
          items:
            $ref: '#/components/schemas/Claim'
        clientType:
          $ref: '#/components/schemas/ClientType'
        identityVerificationSupported:
          description: Enables support for identity journeys.
          type: boolean
          default: false
        oneLoginService:
          type: boolean
          default: false
        idTokenSigningAlgorithm:
          description: Algorithm used to sign the ID token
          $ref: '#/components/schemas/IdTokenSigningAlgorithm'
        smokeTest:
          type: boolean
          default: false
        landingPageUrl:
          description: Page to be redirected to after in-person identity check
          type: string
        clientLoCs:
          description: Pertains to the level of security for identity verification. Prior approval is required for low and high levels of confidence
          type: array
          items:
            $ref: '#/components/schemas/ClientLoC'
        permitMissingNonce:
          description: Allows missing nonce in auth request. If identityVerificationSupported is true, this will always be false
          type: boolean
          default: false
        channel:
          description: Determines the layout of the login pages (web for web browser, generic_app for mobile app)
          $ref: '#/components/schemas/Channel'
        maxAgeEnabled:
          description: Whether to enforce max age for auth requests. If the auth time for the current session has expired, a new session will be generated
          type: boolean
          default: false
        pkceEnforced:
          description: Whether to use PKCE code challenges
          type: boolean
          default: false
        rateLimit:
          description: The maximum number of requests allowed for this client in a 1 minute period
          type: integer
          nullable: true
      example:
        clientName: 'My Example Service'
        clientAuthentication:
          type: JWKS
          jwksUrl: 'http://example.com'
          tokenAuthMethod: 'private_key_jwt'
        scopes:
          - 'openid'
          - 'email'
          - 'phone'
        redirectUrls:
          - 'https://example.com/callback'
        contacts:
          - '<email>'
        postLogoutRedirectUrls:
          - 'https://example.com/signed-out'
        backChannelLogoutUri: 'https://example.com/back-channel-logout'
        serviceType: 'MANDATORY'
        sectorIdentifierUri: 'https://example.com'
        subjectType: 'pairwise'
        isActive: true
        cookieConsentShared: false
        testClient: false
        jarValidationRequired: false
        claims:
          - 'https://vocab.account.gov.uk/v1/coreIdentityJWT'
        clientType: 'web'
        identityVerificationSupported: true
        oneLoginService: false
        idTokenSigningAlgorithm: 'ES256'
        clientSecret: null
        smokeTest: false
        landingPageUrl: 'https://example.com'
        clientLoCs:
          - 'P2'
          - 'P0'
        permitMissingNonce: false
        channel: 'web'
        maxAgeEnabled: false
        pkceEnforced: true
        rateLimit: 100
    PublicKeySource:
      type: string
      enum:
        - STATIC
        - JWKS
      default: STATIC
    IdTokenSigningAlgorithm:
      type: string
      enum:
        - ES256
        - RS256
      default: ES256
    Channel:
      type: string
      enum:
        - web
        - generic_app
        - strategic_app
      default: web
    Scopes:
      type: array
      items:
        $ref: '#/components/schemas/Scope'
    Scope:
      type: string
      enum:
        - openid
        - phone
        - email
        - wallet_subject_id
        - am
        - offline_access
    ServiceType:
      type: string
      enum:
        - MANDATORY
        - OPTIONAL
      default: MANDATORY
    SubjectType:
      type: string
      enum:
        - pairwise
        - public
    Claim:
      type: string
      enum:
        - 'https://vocab.account.gov.uk/v1/passport'
        - 'https://vocab.account.gov.uk/v1/drivingPermit'
        - 'https://vocab.account.gov.uk/v1/coreIdentityJWT'
        - 'https://vocab.account.gov.uk/v1/address'
        - 'https://vocab.account.gov.uk/v1/returnCode'
    ClientLoC:
      type: string
      enum:
        - P0
        - P1
        - P2
        - P3
    TokenAuthMethod:
      type: string
      enum:
        - private_key_jwt
        - client_secret_post
    ClientAuthentication:
      oneOf:
        - $ref: '#/components/schemas/JwksAuthentication'
        - $ref: '#/components/schemas/StaticPublicKeyAuthentication'
        - $ref: '#/components/schemas/StaticClientSecretAuthentication'
      discriminator:
        propertyName: type
        mapping:
          JWKS: '#/components/schemas/JwksAuthentication'
          STATIC: '#/components/schemas/StaticPublicKeyAuthentication'
          CLIENT_SECRET: '#/components/schemas/StaticClientSecretAuthentication'
    JwksAuthentication:
      description: Authenticate using a JWKS endpoint
      type: object
      required:
        - type
        - jwksUrl
      properties:
        type:
          type: string
          enum: [JWKS]
          tokenAuthMethod:
            $ref: '#/components/schemas/TokenAuthMethod'
        jwksUrl:
          type: string
          format: uri
          example: 'http://test.com'
        tokenAuthMethod: private_key_jwt
    StaticPublicKeyAuthentication:
      description: Authenticate using a static public key
      type: object
      required:
        - type
        - publicKey
      properties:
        type:
          type: string
          enum: [STATIC]
          tokenAuthMethod:
            $ref: '#/components/schemas/TokenAuthMethod'
        publicKey:
          type: string
        tokenAuthMethod: private_key_jwt
    StaticClientSecretAuthentication:
      description: Authenticate using a public key generated from a private key. Note that this requires prior approval
      type: object
      required:
        - type
        - clientSecret
      properties:
        type:
          type: string
          enum: [CLIENT_SECRET]
          tokenAuthMethod:
            $ref: '#/components/schemas/TokenAuthMethod'
        clientSecret:
          type: string
        tokenAuthMethod: client_secret_post
    ClientType:
      type: string
      enum:
          - web
          - app
