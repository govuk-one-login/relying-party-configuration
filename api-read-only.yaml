openapi: 3.0.3
info:
  title: Client Registry API (read only)
  version: 1.0.0
paths:
  /clients:
    get:
      summary: Get all clients (paginated)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClients'

  /client/{id}:
    parameters:
      - name: id
        in: path
        description: 'Client ID'
        required: true
        schema:
          type: string
    get:
      summary: Get client by clientId
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClientWithID'

components:
  schemas:
    PaginatedResponse:
      type: object
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_items:
          type: integer
        total_pages:
          type: integer
    PaginatedClients:
      allOf:
        - $ref: '#/components/schemas/PaginatedResponse'
        - type: object
          properties:
            clients:
              type: array
              items:
                $ref: '#/components/schemas/ClientSummary'
      example:
        page: 1
        page_size: 3
        total_items: 6
        total_pages: 2
        clients:
          - clientID: testClientId1
            clientName: My Test Client 1
          - clientID: testClientId2
            clientName: My Test Client 2
          - clientID: testClientId3
            clientName: My Test Client 3
    ClientSummary:
      type: object
      properties:
        clientID:
          type: string
        clientName:
          type: string
    ClientWithID:
      required:
        - clientID
      allOf:
        - $ref: '#/components/schemas/Client'
        - type: object
          properties:
            clientID:
              type: string
    Client:
      type: object
      required:
        - clientName
        - publicKeySource
        - redirectUrls
        - scopes
      properties:
        clientName:
          type: string
        publicKeySource:
          $ref: '#/components/schemas/PublicKeySource'
        publicKey:
          type: string
        jwksUrl:
          type: string
        scopes:
          $ref: '#/components/schemas/Scopes'
        redirectUrls:
          type: array
          items:
            type: string
        contacts:
          type: array
          items:
            type: string
        postLogoutRedirectUrls:
          type: array
          items:
            type: string
        backChannelLogoutUri:
          type: string
        serviceType:
          $ref: '#/components/schemas/ServiceType'
        sectorIdentifierUri:
          type: string
        subjectType:
          $ref: '#/components/schemas/SubjectType'
        isActive:
          type: boolean
          default: true
        cookieConsentShared:
          type: boolean
          default: false
        testClient:
          type: boolean
          default: false
        jarValidationRequired:
          type: boolean
          default: false
        claims:
          type: array
          items:
            $ref: '#/components/schemas/Claim'
        clientType:
          type: string
        identityVerificationSupported:
          type: boolean
          default: false
        oneLoginService:
          type: boolean
          default: false
        idTokenSigningAlgorithm:
          $ref: '#/components/schemas/IdTokenSigningAlgorithm'
        tokenAuthMethod:
          $ref: '#/components/schemas/TokenAuthMethod'
        clientSecret:
          type: string
        smokeTest:
          type: boolean
          default: false
        landingPageUrl:
          type: string
        clientLoCs:
          type: array
          items:
            $ref: '#/components/schemas/ClientLoC'
        permitMissingNonce:
          type: boolean
          default: false
        channel:
          $ref: '#/components/schemas/Channel'
        maxAgeEnabled:
          type: boolean
          default: false
        pkceEnforced:
          type: boolean
          default: false
        rateLimit:
          type: integer
          nullable: true
      example:
        clientName: 'My Example Service'
        publicKeySource: 'STATIC'
        publicKey: 'MIIBIjANBgkqhkiG9w...'
        jwksUrl: null
        scopes:
          - 'openid'
          - 'email'
          - 'phone'
        redirectUrls:
          - 'https://example.com/callback'
        contacts:
          - '<email>'
        postLogoutRedirectUrls:
          - 'https://example.com/signed-out'
        backChannelLogoutUri: 'https://example.com/back-channel-logout'
        serviceType: 'MANDATORY'
        sectorIdentifierUri: 'https://example.com'
        subjectType: 'pairwise'
        isActive: true
        cookieConsentShared: false
        testClient: false
        jarValidationRequired: false
        claims:
          - 'https://vocab.account.gov.uk/v1/coreIdentityJWT'
        clientType: 'web'
        identityVerificationSupported: true
        oneLoginService: false
        idTokenSigningAlgorithm: 'ES256'
        tokenAuthMethod: 'private_key_jwt'
        clientSecret: null
        smokeTest: false
        landingPageUrl: 'https://example.com'
        clientLoCs:
          - 'P2'
          - 'P0'
        permitMissingNonce: false
        channel: 'web'
        maxAgeEnabled: false
        pkceEnforced: true
        rateLimit: 100
    PublicKeySource:
      type: string
      enum:
        - STATIC
        - JWKS
      default: STATIC
    IdTokenSigningAlgorithm:
      type: string
      enum:
        - ES256
        - RS256
      default: ES256
    Channel:
      type: string
      enum:
        - web
        - generic_app
        - strategic_app
      default: web
    Scopes:
      type: array
      items:
        $ref: '#/components/schemas/Scope'
    Scope:
      type: string
      enum:
        - openid
        - phone
        - email
        - wallet_subject_id
        - am
        - offline_access
    ServiceType:
      type: string
      enum:
        - MANDATORY
        - OPTIONAL
      default: MANDATORY
    SubjectType:
      type: string
      enum:
        - pairwise
        - public
    Claim:
      type: string
      enum:
        - 'https://vocab.account.gov.uk/v1/passport'
        - 'https://vocab.account.gov.uk/v1/drivingPermit'
        - 'https://vocab.account.gov.uk/v1/coreIdentityJWT'
        - 'https://vocab.account.gov.uk/v1/address'
        - 'https://vocab.account.gov.uk/v1/returnCode'
    ClientLoC:
      type: string
      enum:
        - P0
        - P1
        - P2
        - P3
    TokenAuthMethod:
      type: string
      enum:
        - private_key_jwt
        - client_secret_post
