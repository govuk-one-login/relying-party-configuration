AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Relying Party Configuration

#      Tags:
#        Service: Relying Party Configuration
#        Source: govuk-one-login/relying-party-configuration
#        Owner: di-orchestration@digital.cabinet-office.gov.uk

Resources:
  ApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub ${AWS::StackName}-ApiGateway
      StageName: Live
      AlwaysDeploy: true
      Tags:
        FMSRegionalPolicy: false
        CustomPolicy: true

  TempLambda:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: temp-api.handler
      Runtime: nodejs20.x
      Architectures:
        - arm64
      Events:
        Get:
          Type: Api
          Properties:
            RestApiId: !Ref ApiGateway
            Path: /temp-api
            Method: get
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - src/temp-api.ts
        Minify: true
        Sourcemap: true
        Target: es2022
        UseNpmCi: True